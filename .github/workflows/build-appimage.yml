# Builds the COMPLETE, self-contained KeeperFX Linux Alpha AppImage on Ubuntu 24.04:
# launcher + engine + every library + the free game data, all in one file. The user
# downloads it, runs it, and the only thing it ever needs is their own Dungeon Keeper
# files. Runs on GitHub's servers.
#
# Also emits the flat full.7z that the in-launcher self-updater downloads.
# The Flatpak is built separately (build-flatpak.yml, monthly/manual) to keep this
# per-release build fast. ccache + Qt/CPM caches turn a ~18 min cold build into a
# ~4-5 min warm one.
name: Build Self-Contained AppImage

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache

jobs:
  appimage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4    # the launcher repo

      - name: Install dependencies (launcher build + engine runtime libs + appimage tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache cmake ninja-build git pkg-config file wget desktop-file-utils python3 python3-pip p7zip-full \
            libgl1-mesa-dev zlib1g-dev libfuse2t64 \
            libxkbcommon0 libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 libxcb-util1 \
            libsdl2-dev libsdl2-mixer-dev libsdl2-net-dev libsdl2-image-dev \
            libavformat-dev libavcodec-dev libavutil-dev libswscale-dev libswresample-dev \
            libopenal-dev libluajit-5.1-dev libspng-dev libminizip-dev libepoxy-dev \
            libminiupnpc-dev libnatpmp-dev libssl-dev libzstd-dev

      # --- Caches: the launcher build (LIEF + CPM deps) dominates cold-build time ---
      - name: Cache compiled objects (ccache)
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-appimage-${{ github.run_id }}
          restore-keys: ccache-appimage-

      - name: Cache CPM dependency sources (LIEF, etc.)
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'cpm-package-lock.cmake') }}
          restore-keys: cpm-

      - name: Cache Qt 6.8
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/Qt
          key: qt-6.8.3-linux-gcc64

      - name: Install Qt 6.8 (the launcher needs Qt >=6.7; 24.04 only has 6.4)
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          pip install --break-system-packages aqtinstall
          python3 -m aqt install-qt linux desktop 6.8.3 linux_gcc_64 -O "$RUNNER_TEMP/Qt"

      - name: Set up Qt + ccache environment
        run: |
          QT="$RUNNER_TEMP/Qt/6.8.3/gcc_64"
          echo "$QT/bin" >> "$GITHUB_PATH"
          echo "CMAKE_PREFIX_PATH=$QT" >> "$GITHUB_ENV"
          echo "QMAKE=$QT/bin/qmake" >> "$GITHUB_ENV"
          ccache --max-size=1G --zero-stats

      - name: Build the launcher
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build -j"$(nproc)"
          ccache --show-stats

      - name: Build the engine on 24.04 (the released Arch engine won't run on Ubuntu)
        run: |
          git clone https://github.com/ForkedInTime/keeperfx-linux-alpha.git engine
          cd engine
          make -f linux.mk deps/centijson/include/json.h deps/astronomy/include/astronomy.h \
                           deps/enet6/include/enet6/enet.h deps/libcurl/lib/libcurl.a
          BN="$(git rev-list --count HEAD)"
          rm -f src/ver_defs.h
          make -f linux.mk BUILD_NUMBER="$BN" VER_SUFFIX=alpha -j"$(nproc)"
          cd tools/fxfontmaker
          python3 rescale_unifont_hex.py unifont-17.0.04.hex unifont12.hex
          python3 bdf_to_hex.py wenquanyi_9pt.bdf wenquanyi.hex
          python3 merge_hex.py unifont12.hex wenquanyi.hex merged12.hex
          python3 unifont_hex_to_binary.py unifont-17.0.04.hex    font16.fxfont     16
          python3 unifont_hex_to_binary.py unifont_jp-17.0.04.hex font16_JPN.fxfont 16
          python3 unifont_hex_to_binary.py unifont_t-17.0.04.hex  font16_CHT.fxfont 16
          python3 unifont_hex_to_binary.py merged12.hex           font12.fxfont     12

      - name: Assemble the AppDir (launcher + engine + payload data)
        run: |
          APPDIR="$PWD/AppDir"
          mkdir -p "$APPDIR/usr/bin"
          # launcher + bit7z runtime + icon + desktop
          cp build/keeperfx-launcher-qt "$APPDIR/usr/bin/"
          cp ext/7z.so "$APPDIR/usr/bin/"
          install -Dm644 packaging/keeperfx-launcher-qt.png \
            "$APPDIR/usr/share/icons/hicolor/256x256/apps/keeperfx-launcher-qt.png"
          install -Dm644 packaging/keeperfx-launcher-qt.desktop \
            "$APPDIR/usr/share/applications/keeperfx-launcher-qt.desktop"
          # payload = free game data from the published package (everything EXCEPT its Arch engine)
          wget -q https://github.com/ForkedInTime/keeperfx-linux-alpha/releases/latest/download/keeperfx-linux-alpha-x86_64-full.7z
          7z x -bso0 keeperfx-linux-alpha-x86_64-full.7z -opkg
          P="$APPDIR/payload"
          mkdir -p "$P"
          cp -rf pkg/. "$P/"                                # the full.7z is FLAT (files at root)
          # overwrite with the 24.04-built engine + fonts + version
          cp -f engine/bin/keeperfx "$P/keeperfx"
          cp -f engine/tools/fxfontmaker/*.fxfont "$P/fxdata/"
          sed -n 's/.*VER_STRING  "\(.*\)".*/\1/p' engine/src/ver_defs.h > "$P/version.txt"
          # include the launcher + 7z.so IN the payload, so an in-launcher update (which
          # downloads this same package) updates the LAUNCHER too — not just the engine.
          cp -f build/keeperfx-launcher-qt "$P/keeperfx-launcher-qt"
          cp -f ext/7z.so "$P/7z.so"
          # also put the engine in usr/bin so linuxdeploy bundles ITS libraries (removed after)
          cp -f engine/bin/keeperfx "$APPDIR/usr/bin/keeperfx"
          echo "payload size: $(du -sh "$P" | cut -f1)"
          # Repackage that exact flat payload as the in-launcher update archive. This is
          # what the launcher's self-updater downloads (the asset ending in -full.7z), so
          # it now carries the freshly-built Qt-6.8 launcher + 24.04 engine + version.txt.
          ( cd "$P" && 7z a -bso0 "$GITHUB_WORKSPACE/keeperfx-linux-alpha-x86_64-full.7z" . )
          ls -la "$GITHUB_WORKSPACE/keeperfx-linux-alpha-x86_64-full.7z"

      - name: Get linuxdeploy + Qt plugin + appimagetool
        run: |
          base=https://github.com/linuxdeploy
          wget -q "$base/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -q "$base/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage"
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage appimagetool-x86_64.AppImage

      - name: Bundle ALL libraries (launcher Qt + engine SDL2/ffmpeg/OpenAL/…)
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          # linuxdeploy scans usr/bin (launcher + keeperfx) and bundles every library both need.
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            -d packaging/keeperfx-launcher-qt.desktop \
            -i packaging/keeperfx-launcher-qt.png \
            --plugin qt
          # the engine's libs are now in usr/lib; remove the duplicate engine binary from usr/bin
          # (the real one runs from the payload, deployed to the writable install dir)
          rm -f AppDir/usr/bin/keeperfx

      - name: Install the custom AppRun (deploy payload to a writable install dir)
        run: |
          # linuxdeploy leaves AppRun as a SYMLINK into usr/bin; writing through it would
          # clobber the launcher binary, so remove it and write a real script at the root.
          rm -f AppDir/AppRun
          cat > AppDir/AppRun <<'EOF'
          #!/bin/bash
          HERE="${APPDIR:-$(dirname "$(readlink -f "$0")")}"
          export LD_LIBRARY_PATH="$HERE/usr/lib:$LD_LIBRARY_PATH"
          export QT_PLUGIN_PATH="$HERE/usr/plugins"
          export QT_QPA_PLATFORM_PLUGIN_PATH="$HERE/usr/plugins/platforms"
          # We only bundle the xcb platform plugin; use it (via XWayland on Wayland) to
          # avoid the "Could not find the Qt platform plugin wayland" warning.
          export QT_QPA_PLATFORM="${QT_QPA_PLATFORM:-xcb}"
          INSTALL="${KFX_ALPHA_PREFIX:-$HOME/.local/share/keeperfx-alpha}"
          mkdir -p "$INSTALL"
          # Don't let our bundled glib load the SYSTEM gvfs/gio modules (symbol mismatch
          # on newer distros: 'g_variant_builder_init_static' undefined). Point GIO at an
          # empty dir so it loads none — Qt's own file dialogs are unaffected.
          mkdir -p "$INSTALL/.gio-modules"
          export GIO_MODULE_DIR="$INSTALL/.gio-modules"
          # deploy the bundled game once (or when the version changes)
          NEWVER="$(cat "$HERE/payload/version.txt" 2>/dev/null)"
          if [ "$(cat "$INSTALL/.bundled-version" 2>/dev/null)" != "$NEWVER" ]; then
            cp -rf "$HERE/payload/." "$INSTALL/"
            echo "$NEWVER" > "$INSTALL/.bundled-version"
          fi
          # The launcher + 7z.so live in the payload (deployed above), so an in-launcher
          # update can replace them. Only place them if MISSING — never clobber, or we'd
          # revert a launcher that the in-launcher update just upgraded.
          [ -x "$INSTALL/keeperfx-launcher-qt" ] || cp -f "$HERE/payload/keeperfx-launcher-qt" "$INSTALL/keeperfx-launcher-qt"
          [ -f "$INSTALL/7z.so" ] || cp -f "$HERE/payload/7z.so" "$INSTALL/7z.so" 2>/dev/null || true
          # Add an applications-menu entry so it's launchable like any installed game,
          # not just by finding the AppImage file. $APPIMAGE is the AppImage's own path.
          if [ -n "$APPIMAGE" ]; then
            appdir="$HOME/.local/share/applications"; icondir="$HOME/.local/share/icons"
            mkdir -p "$appdir" "$icondir"
            cp -f "$HERE/usr/share/icons/hicolor/256x256/apps/keeperfx-launcher-qt.png" "$icondir/keeperfx-linux-alpha.png" 2>/dev/null || true
            {
              echo "[Desktop Entry]"
              echo "Type=Application"
              echo "Name=KeeperFX Linux Alpha"
              echo "Comment=Dungeon Keeper, native on Linux"
              echo "Exec=\"$APPIMAGE\""
              echo "Icon=$icondir/keeperfx-linux-alpha.png"
              echo "Terminal=false"
              echo "Categories=Game;StrategyGame;"
            } > "$appdir/keeperfx-linux-alpha.desktop"
            update-desktop-database "$appdir" 2>/dev/null || true
          fi
          cd "$INSTALL"
          exec "$INSTALL/keeperfx-launcher-qt" "$@"
          EOF
          chmod +x AppDir/AppRun

      - name: Package the AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          ARCH: x86_64
        run: |
          ./appimagetool-x86_64.AppImage AppDir KeeperFX-Linux-Alpha-x86_64.AppImage
          ls -la KeeperFX-Linux-Alpha-x86_64.AppImage

      - name: Upload the AppImage (downloadable from this CI run)
        uses: actions/upload-artifact@v4
        with:
          name: KeeperFX-Linux-Alpha-AppImage
          path: KeeperFX-Linux-Alpha-x86_64.AppImage

      - name: Upload the full.7z update package (downloadable from this CI run)
        uses: actions/upload-artifact@v4
        with:
          name: keeperfx-linux-alpha-full-7z
          path: keeperfx-linux-alpha-x86_64-full.7z

      - name: Attach the AppImage + full.7z to the release (only when triggered by a release)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            KeeperFX-Linux-Alpha-x86_64.AppImage
            keeperfx-linux-alpha-x86_64-full.7z
